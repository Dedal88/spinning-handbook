<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Справочник спиннингиста</title>
    <link rel="icon" href="./Images/logo.svg" type="image/x-icon" />
    <link href="style.css" rel="stylesheet" />
    <script src="script.js" defer></script>
    <script src="header.js" defer></script>
    <script src="mobile-menu.js" defer></script>
  </head>
  <body class="main-page">
    <header class="header">
      <div class="wrapper header__wrapper">
        <div class="header__line">
          <span class="hamburger">
            <span class="hamburger__line"></span>
          </span>
          <a href="./index.html" class="logo">
            <img src="./Images/logo.svg" alt="logo" class="logo__image" />
            Справочник спиннингиста
          </a>
        </div>
        <nav class="header__navigation">
          <ul class="navigation">
            <li>
              <a href="index.html" class="navigation__link">Главная</a>
            </li>
            <li>
              <a href="about.html" class="navigation__link">О программе</a>
            </li>
            <li>
              <a href="contact.html" class="navigation__link">Контакты</a>
            </li>
          </ul>
        </nav>
      </div>

      <div class="sidebar-menu">
        <div class="sidebar-menu__overlay"></div>
        <div class="sidebar-menu__content">
          <button class="sidebar-menu__close-btn">
            <img
              class="sidebar-menu__close-btn-image"
              src="./Images/close.svg"
              alt="Закрыть меню"
            />
          </button>

          <nav class="sidebar-menu__navigation">
            <ul class="navigation">
              <li class="sidebar-menu__link">
                <a href="index.html">Главная</a>
              </li>
              <li class="sidebar-menu__link">
                <a href="about.html">О программе</a>
              </li>
              <li class="sidebar-menu__link">
                <a href="contact.html">Контакты</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <main>
      <div class="options">
        <div id="options" class="options__wrapper wrapper">
          <div class="options__option">
            <label for="fishes">Кого ловить будем ?!</label>
            <select id="fishes" class="options__input">
              <option value="Щука">Щука</option>
              <option value="Судак">Судак</option>
              <option value="Окунь">Окунь</option>
              <option value="Жерех">Жерех</option>
            </select>
          </div>
          <div class="options__option">
            <label for="dat">Когда ловить будем ?!</label>
            <input type="date" id="dat" class="options__input" />
          </div>
          <div class="options__option">
            <label for="regLov">Где ловить будем ?!</label>
            <select id="regLov" class="options__input">
              <option value=""></option>
              <option value="В Ивановской области">В Ивановской области</option>
              <option value="В Ярославской области">
                В Ярославской области
              </option>
            </select>
          </div>
        </div>
        <div class="button__wrapper">
          <button class="button">Получить информацию</button>
        </div>
      </div>

      <article hidden id="descripFish" class="fishes-description">
        <div class="close-button__wrapper">
          <img
            src="./Images/close.svg"
            alt="закрыть описание"
            class="fishes-description__close-button"
          />
        </div>
        <section class="details">
          <h2 class="name" id="name"></h2>
          <img class="image" id="pic" alt="Фото рыбы" />
          <p id="information" class="description"></p>
          <h3 class="name" id="desKlev"></h3>
          <p id="infKlev" class="description"></p>
          <h3 class="name" id="desRegLov"></h3>
          <p id="infRegLov" class="description"></p>
        </section>
      </article>
    </main>
    <footer class="footer">
      <div>
        <p>© Copyright 2026</p>
      </div>
    </footer>
  </body>
</html>
